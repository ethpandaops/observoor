name: CPU Accounting E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  cpu-accounting:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - el: geth
            cl: nimbus
            params_file: e2e/cpu-accounting/network-params/nimbus-geth.yaml
          - el: erigon
            cl: nimbus
            params_file: e2e/cpu-accounting/network-params/nimbus-erigon.yaml
          - el: geth
            cl: teku
            params_file: e2e/cpu-accounting/network-params/teku-geth.yaml
          - el: nethermind
            cl: lighthouse
            params_file: e2e/cpu-accounting/network-params/lighthouse-nethermind.yaml
          - el: besu
            cl: nimbus
            params_file: e2e/cpu-accounting/network-params/nimbus-besu.yaml
          - el: reth
            cl: nimbus
            params_file: e2e/cpu-accounting/network-params/nimbus-reth.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | \
            sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt-get update
          sudo apt-get install -y kurtosis-cli

      - name: Start Kurtosis engine
        run: kurtosis engine start

      - name: Start Ethereum network
        env:
          ENCLAVE: cpu-accounting-${{ matrix.cl }}-${{ matrix.el }}
        run: |
          kurtosis run --enclave "$ENCLAVE" \
            github.com/ethpandaops/ethereum-package \
            --args-file "${{ matrix.params_file }}"

      - name: Get beacon endpoint
        id: beacon
        env:
          ENCLAVE: cpu-accounting-${{ matrix.cl }}-${{ matrix.el }}
          CL_SERVICE: cl-1-${{ matrix.cl }}-${{ matrix.el }}
        run: |
          BEACON_ENDPOINT=$(kurtosis port print "$ENCLAVE" "$CL_SERVICE" http)
          echo "endpoint=$BEACON_ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Generate config
        run: |
          resolve_container_name() {
            local logical_name="$1"
            docker ps --format '{{.Names}}' | grep "$logical_name" | head -1
          }

          resolve_cgroup_path() {
            local container_name="$1"
            local container_pid
            container_pid="$(docker inspect --format '{{.State.Pid}}' "$container_name")"
            awk -F: '$1 == "0" { print "/sys/fs/cgroup" $3; found = 1 } END { exit found ? 0 : 1 }' "/proc/${container_pid}/cgroup"
          }

          BEACON_ENDPOINT_FOR_CONTAINER="${{ steps.beacon.outputs.endpoint }}"
          BEACON_ENDPOINT_FOR_CONTAINER="${BEACON_ENDPOINT_FOR_CONTAINER/127.0.0.1/host.docker.internal}"
          BEACON_ENDPOINT_FOR_CONTAINER="${BEACON_ENDPOINT_FOR_CONTAINER/localhost/host.docker.internal}"

          EL_CONTAINER="$(resolve_container_name "el-1-${{ matrix.el }}-${{ matrix.cl }}")"
          CL_CONTAINER="$(resolve_container_name "cl-1-${{ matrix.cl }}-${{ matrix.el }}")"
          EL_CGROUP_PATH="$(resolve_cgroup_path "$EL_CONTAINER")"
          CL_CGROUP_PATH="$(resolve_cgroup_path "$CL_CONTAINER")"

          echo "EL container: ${EL_CONTAINER}"
          echo "CL container: ${CL_CONTAINER}"
          echo "EL cgroup: ${EL_CGROUP_PATH}"
          echo "CL cgroup: ${CL_CGROUP_PATH}"

          export BEACON_ENDPOINT_FOR_CONTAINER EL_CGROUP_PATH CL_CGROUP_PATH
          python3 - <<'PY'
          import os
          from pathlib import Path

          template = Path("e2e/cpu-accounting/observoor.yaml.tmpl").read_text()
          cgroup_lines = "\n".join(
              f"    - {path}"
              for path in (
                  os.environ["EL_CGROUP_PATH"],
                  os.environ["CL_CGROUP_PATH"],
              )
          )
          rendered = (
              template.replace("${BEACON_ENDPOINT}", os.environ["BEACON_ENDPOINT_FOR_CONTAINER"])
              .replace("${TARGET_CGROUP_PATHS}", cgroup_lines)
          )
          Path("e2e/cpu-accounting/observoor.yaml").write_text(rendered)
          PY

      - name: Start ClickHouse
        run: |
          docker compose -f e2e/cpu-accounting/docker-compose.yml up -d --build clickhouse

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:8123/?query=SELECT%201" >/dev/null && timeout 1 bash -lc '</dev/tcp/127.0.0.1/9000' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "clickhouse did not become ready" >&2
          exit 1

      - name: Start observoor
        run: |
          docker compose -f e2e/cpu-accounting/docker-compose.yml up -d --build observoor

      - name: Wait for observoor health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/healthz >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "observoor did not become healthy" >&2
          exit 1

      - name: Validate CPU accounting
        env:
          ENCLAVE: cpu-accounting-${{ matrix.cl }}-${{ matrix.el }}
          EL_CLIENT: ${{ matrix.el }}
          CL_CLIENT: ${{ matrix.cl }}
          MEASUREMENT_SECONDS: "300"
          LOAD_WORKERS: "8"
          LOAD_WARMUP_SECONDS: "15"
          REL_TOLERANCE: "0.50"
          MIN_TRUTH_CORES: "0.03"
          MAX_WINDOW_CORE_FACTOR: "1.05"
        run: |
          chmod +x e2e/cpu-accounting/validate.sh
          ./e2e/cpu-accounting/validate.sh

      - name: Collect logs on failure
        if: failure()
        env:
          ENCLAVE: cpu-accounting-${{ matrix.cl }}-${{ matrix.el }}
        run: |
          docker compose -f e2e/cpu-accounting/docker-compose.yml logs > cpu-accounting-docker-logs.txt || true
          docker ps -a > cpu-accounting-docker-ps.txt || true
          kurtosis enclave dump "$ENCLAVE" ./cpu-accounting-kurtosis-dump || true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-accounting-${{ matrix.cl }}-${{ matrix.el }}-logs
          path: |
            cpu-accounting-docker-logs.txt
            cpu-accounting-docker-ps.txt
            cpu-accounting-kurtosis-dump/

      - name: Cleanup
        if: always()
        env:
          ENCLAVE: cpu-accounting-${{ matrix.cl }}-${{ matrix.el }}
        run: |
          docker compose -f e2e/cpu-accounting/docker-compose.yml down -v || true
          kurtosis enclave rm -f "$ENCLAVE" || true
          kurtosis engine stop || true
