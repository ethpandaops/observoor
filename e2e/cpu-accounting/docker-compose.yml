services:
  clickhouse:
    build:
      context: ../..
      dockerfile: Dockerfile.clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    volumes:
      - ../configs/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - clickhouse-data:/var/lib/clickhouse

  observoor:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
    privileged: true
    pid: "host"
    command: ["--config", "/etc/observoor/config.yaml"]
    ports:
      - "9090:9090"
    volumes:
      - ./observoor.yaml:/etc/observoor/config.yaml:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - /proc:/proc:ro
      - /sys/kernel/btf:/sys/kernel/btf:ro

volumes:
  clickhouse-data:
